<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Helmhost">
  <!-- Based on previous production layout: same shield/bar/navy; clearer wheel + HELMHOST in bar.
       Outside the rounded plate is transparent (no white corners). -->
  <rect width="1024" height="1024" rx="228" fill="#11192D"/>
  <!-- Shield — previous proportions (~58% wide, top~17%, tip~82%) -->
  <path fill="#3B485E" d="
    M512 172
    C640 172 740 210 780 256
    L780 460
    C780 620 660 750 512 840
    C364 750 244 620 244 460
    L244 256
    C284 210 384 172 512 172 Z"/>
  <!-- Steering wheel (grips outside rim), sized to previous wheel footprint -->
  <g transform="translate(512,420)">
    <g fill="#F4F6FA">
      <rect x="-12" y="-210" width="24" height="48" rx="12"/>
      <rect x="-12" y="162" width="24" height="48" rx="12"/>
      <rect x="-210" y="-12" width="48" height="24" rx="12"/>
      <rect x="162" y="-12" width="48" height="24" rx="12"/>
      <g transform="rotate(45)"><rect x="-10" y="-198" width="20" height="40" rx="10"/></g>
      <g transform="rotate(135)"><rect x="-10" y="-198" width="20" height="40" rx="10"/></g>
      <g transform="rotate(225)"><rect x="-10" y="-198" width="20" height="40" rx="10"/></g>
      <g transform="rotate(315)"><rect x="-10" y="-198" width="20" height="40" rx="10"/></g>
    </g>
    <g fill="none" stroke="#F4F6FA" stroke-linecap="round" stroke-linejoin="round">
      <circle r="155" stroke-width="28"/>
      <circle r="50" stroke-width="20"/>
      <g stroke-width="18">
        <line x1="0" y1="-50" x2="0" y2="-142"/>
        <line x1="0" y1="50" x2="0" y2="142"/>
        <line x1="-50" y1="0" x2="-142" y2="0"/>
        <line x1="50" y1="0" x2="142" y2="0"/>
        <line x1="-35" y1="-35" x2="-100" y2="-100"/>
        <line x1="35" y1="35" x2="100" y2="100"/>
        <line x1="35" y1="-35" x2="100" y2="-100"/>
        <line x1="-35" y1="35" x2="-100" y2="100"/>
      </g>
    </g>
    <circle r="22" fill="#F4F6FA"/>
  </g>
  <!-- Teal bar (previous position/color) with HELMHOST — slightly taller so name reads at 256 -->
  <g transform="translate(512,722)">
    <rect x="-118" y="-20" width="236" height="40" rx="6" fill="#0B8481"/>
    <text x="0" y="7" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="24" font-weight="700" letter-spacing="0.12em" fill="#F4F6FA">HELMHOST</text>
  </g>
</svg>
