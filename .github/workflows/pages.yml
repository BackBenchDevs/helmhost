name: Pages

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "docs/appcast/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv mdbook /usr/local/bin/
      - name: Build
        run: mdbook build docs
      - name: Include appcast feeds
        run: |
          mkdir -p docs/book
          cp -f docs/appcast/appcast.xml docs/book/appcast.xml
          cp -f docs/appcast/appcast-rcs.xml docs/book/appcast-rcs.xml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
