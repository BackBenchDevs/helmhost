name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Detect channel
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-rc.* ]]; then
            echo "channel=rcs" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release package
        shell: bash
        env:
          HELMHOST_CHANNEL: ${{ steps.meta.outputs.channel }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x scripts/*.sh scripts/hh-version
          ./scripts/hh-version sync
          ./scripts/build_release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: helmhost-${{ steps.meta.outputs.channel }}-${{ runner.os }}
          path: dist/${{ steps.meta.outputs.channel }}/*

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect files
        id: files
        shell: bash
        run: |
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print > /tmp/files.txt
          echo "count=$(wc -l </tmp/files.txt)" >> "$GITHUB_OUTPUT"
      - name: Channel
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
