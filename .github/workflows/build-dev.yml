name: Build dev

on:
  push:
    branches: [main, master, dev]
  workflow_dispatch:

concurrency:
  group: build-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Build dev package
        shell: bash
        env:
          HELMHOST_CHANNEL: dev
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x scripts/*.sh scripts/hh-version
          ./scripts/build_dev.sh
      - name: Smoke — FFI in portable artifacts
        shell: bash
        run: |
          chmod +x scripts/assert_ffi_in_artifact.sh
          shopt -s nullglob
          for f in dist/dev/*.zip dist/dev/*.tar.gz; do
            ./scripts/assert_ffi_in_artifact.sh "$f"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: helmhost-dev-${{ runner.os }}-${{ github.sha }}
          path: dist/dev/*
          retention-days: 14

  publish:
    needs: package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: dev-${{ github.sha }}
          prerelease: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
